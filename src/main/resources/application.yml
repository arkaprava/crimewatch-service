spring:
  application:
    name: crime-info-service
  profiles:
    active: dev
  data:
    mongodb:
      uri: mongodb://localhost:27017/crime_info_service
      # Create indexes declared on @Document entities (2dsphere, compound, ...).
      auto-index-creation: true
  graphql:
    graphiql:
      enabled: false
    schema:
      locations: classpath:graphql/

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

info:
  app:
    name: crime-info-service
    version: 0.0.1-SNAPSHOT

# API key auth for GraphQL and actuator (except health). Set keys per profile or env.
security:
  api-keys:
    enabled: true
    read-keys: []
    ingest-keys: []
  rate-limit:
    enabled: true
    limit-health-checks: false
    read:
      requests-per-minute: 120
    ingest:
      requests-per-minute: 20
    anonymous:
      requests-per-minute: 30

# In-process read cache for GraphQL query results (Caffeine by default; Redis in prod).
cache:
  crime:
    backend: caffeine
    maximum-size: 1000
    near-location-ttl: 10m
    search-ttl: 15m
    by-id-ttl: 5m

# Australian crime data ingestion. Sources are CKAN open data portals; set the
# real datastore resource ids and enable per source. Trigger manually via the
# ingestCrimeData GraphQL mutation or enable the schedule below.
ingestion:
  enabled: true
  load-on-startup: true
  schedule:
    enabled: false
    # Twice daily at 03:00 and 15:00 (server local time).
    cron: "0 0 3,15 * * *"
  sa:
    cache-dir: data/sa
    cache-ttl: P7D
    base-url: https://data.sa.gov.au/data
    refresh-on-ingest: false
    package-ids:
      crime-statistics: 860126f7-eeb5-4fbc-be44-069aa0467d11
      offenders: 8afe3e7c-9ed5-4e30-83a6-e8cc60e11f02
  wa:
    cache-dir: data/wa
    cache-ttl: P7D
    districts-file: data/wa/wa-police-districts.geojson
    csv-fallback-filename: crime-timeseries.csv
  nsw:
    cache-dir: data/nsw
    cache-ttl: P90D
    suburb-data-zip-url: https://bocsarblob.blob.core.windows.net/bocsar-open-data/SuburbData.zip
    suburb-data-csv-filename: suburb-data.csv
    csv-fallback-filename: suburb-data-fixture.csv
  tas:
    cache-dir: data/tas
    cache-ttl: P30D
    performance-page-url: https://www.police.tas.gov.au/about-us/our-performance/
    supplement-pdf-url: https://www.police.tas.gov.au/uploads/DPFEM-Crime-Statistics-Supplement-2024-25.pdf
    corporate-performance-pdf-url: https://www.police.tas.gov.au/uploads/Corporate-Performance-Report-March-2026.pdf
    geography-file: data/tas/tas-police-geography.geojson
  nt:
    cache-dir: data/nt
    cache-ttl: P7D
    base-url: https://data.nt.gov.au
    geography-file: data/nt/nt-police-geography.geojson
    serpro-cutover-month: 2023-12
    serpro:
      logical-filename: nt-crime-statistics-serpro.csv
      csv-fallback-filename: nt-crime-statistics-serpro-fixture.csv
      package-search-query: "Current NT Crime Statistics"
    promis:
      logical-filename: nt-crime-statistics-promis.csv
      csv-fallback-filename: nt-crime-statistics-promis-fixture.csv
      package-name: current-nt-crime-statistics-january-2023
  suburbs:
    cache-file: data/suburbs/australian-suburbs.geojson
    cache-ttl: P365D
    fuzzy-match-threshold: 0.85
    load-on-startup: true
  sources:
    - name: qld-police-offences
      enabled: false
      base-url: https://www.data.qld.gov.au
      resource-id: "REPLACE_WITH_RESOURCE_ID"
      state: QLD
      zone-id: Australia/Brisbane
      batch-size: 500
      fields:
        id: _id
        title: offence_description
        category: offence_category
        occurred-at: occurrence_date
        suburb: suburb
        postal-code: postcode
        latitude: latitude
        longitude: longitude
    - name: nsw-bocsar-statistics
      enabled: true
      type: nsw-bocsar-statistics
      state: NSW
      zone-id: Australia/Sydney
      batch-size: 0
      fields:
        suburb: Suburb
        title: Subcategory
        category: Offence category
    - name: vic-csa-offences
      enabled: false
      base-url: https://discover.data.vic.gov.au
      resource-id: "REPLACE_WITH_RESOURCE_ID"
      state: VIC
      zone-id: Australia/Melbourne
      batch-size: 500
      fields:
        id: _id
        title: offence_subdivision
        category: offence_division
        occurred-at: offence_date
        suburb: suburb_town_name
        postal-code: postcode
    - name: sa-police-crime-statistics
      enabled: true
      type: sa-crime-statistics
      package-id: 860126f7-eeb5-4fbc-be44-069aa0467d11
      state: SA
      zone-id: Australia/Adelaide
      batch-size: 0
      resource-names:
        - "Crime Statistics 2024-25"
      fields:
        suburb: Suburb
        title: Offence Description
        category: Offence Division
        offence-count: Count
        reporting-period: Financial Year
    - name: wa-police-crime-statistics
      enabled: false
      type: wa-crime-statistics
      state: WA
      zone-id: Australia/Perth
      batch-size: 10000
      fields:
        geography-level: Geography Level
        suburb: Location
        title: Offence Description
        category: Offence Group
        offence-count: Count
        reporting-period: Period
    - name: tas-dpfem-crime-statistics
      enabled: true
      type: tas-crime-statistics-supplement
      state: TAS
      zone-id: Australia/Hobart
      batch-size: 5000
    - name: tas-corporate-performance
      enabled: false
      type: tas-corporate-performance
      state: TAS
      zone-id: Australia/Hobart
      batch-size: 5000
    - name: nt-police-crime-statistics
      enabled: true
      type: nt-crime-statistics
      series: serpro
      state: NT
      zone-id: Australia/Darwin
      batch-size: 50000
      fields:
        reporting-period-year: Year
        reporting-period-month: Month number
        category: Offence category
        title: "Offence type "
        suburb: Reporting Region
        geography-level: Statistical Area 2
        offence-count: Number of offences
        alcohol-involvement: Alcohol involvement
        dv-involvement: DV involvement
    - name: nt-police-crime-statistics-historical
      enabled: true
      type: nt-crime-statistics
      series: promis
      state: NT
      zone-id: Australia/Darwin
      batch-size: 50000
      fields:
        reporting-period-year: Year
        reporting-period-month: Month number
        category: Offence category
        title: "Offence type "
        suburb: Reporting Region
        geography-level: Statistical Area 2
        offence-count: Number of offences
        alcohol-involvement: Alcohol involvement
        dv-involvement: DV involvement
    - name: act-policing-incidents
      enabled: false
      # ACT Policing datasets mirrored on the national portal; the ACT's own
      # portal (data.act.gov.au) is Socrata, which needs a custom CrimeDataSource.
      base-url: https://data.gov.au
      resource-id: "REPLACE_WITH_RESOURCE_ID"
      state: ACT
      zone-id: Australia/Canberra
      batch-size: 500
      fields:
        id: _id
        title: offence_type
        category: offence_category
        occurred-at: incident_date
        suburb: suburb
        postal-code: postcode
