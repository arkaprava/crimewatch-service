ingestion:
  load-on-startup: false
  suburbs:
    cache-file: data/suburbs/australian-suburbs.geojson
  sa:
    cache-dir: data/sa
  wa:
    cache-dir: data/wa
    districts-file: data/wa/wa-police-districts.geojson
    csv-fallback-filename: crime-timeseries.csv
  nt:
    cache-dir: data/nt
    base-url: http://127.0.0.1:1
    geography-file: data/nt/nt-police-geography.geojson
    serpro:
      csv-fallback-filename: nt-crime-statistics-serpro-fixture.csv
    promis:
      csv-fallback-filename: nt-crime-statistics-promis-fixture.csv
  sources:
    - name: sa-police-crime-statistics
      enabled: true
      type: sa-crime-statistics
      package-id: 860126f7-eeb5-4fbc-be44-069aa0467d11
      state: SA
      zone-id: Australia/Adelaide
      batch-size: 5000
      resource-names:
        - "Crime Statistics 2024-25"
      fields:
        suburb: Suburb
        title: Offence Description
        category: Offence Division
        offence-count: Count
        reporting-period: Financial Year
    - name: wa-police-crime-statistics
      enabled: true
      type: wa-crime-statistics
      state: WA
      zone-id: Australia/Perth
      batch-size: 10000
      fields:
        geography-level: Geography Level
        suburb: Location
        title: Offence Description
        category: Offence Group
        offence-count: Count
        reporting-period: Period
    - name: nsw-bocsar-statistics
      enabled: true
      type: nsw-bocsar-statistics
      state: NSW
      zone-id: Australia/Sydney
      batch-size: 5000
      fields:
        suburb: Suburb
        title: Subcategory
        category: Offence category
    - name: nt-police-crime-statistics
      enabled: true
      type: nt-crime-statistics
      series: serpro
      state: NT
      zone-id: Australia/Darwin
      batch-size: 50000
      fields:
        reporting-period-year: Year
        reporting-period-month: Month number
        category: Offence category
        title: "Offence type "
        suburb: Reporting Region
        geography-level: Statistical Area 2
        offence-count: Number of offences
        alcohol-involvement: Alcohol involvement
        dv-involvement: DV involvement
    - name: nt-police-crime-statistics-historical
      enabled: true
      type: nt-crime-statistics
      series: promis
      state: NT
      zone-id: Australia/Darwin
      batch-size: 50000
      fields:
        reporting-period-year: Year
        reporting-period-month: Month number
        category: Offence category
        title: "Offence type "
        suburb: Reporting Region
        geography-level: Statistical Area 2
        offence-count: Number of offences
        alcohol-involvement: Alcohol involvement
        dv-involvement: DV involvement

security:
  api-keys:
    read-keys:
      - test-read-key
    ingest-keys:
      - test-ingest-key
  rate-limit:
    read:
      requests-per-minute: 10000
    ingest:
      requests-per-minute: 10000
    anonymous:
      requests-per-minute: 10000

cache:
  crime:
    backend: caffeine
